name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate calculator.py has not been tampered with
        id: check-tamper
        run: |
          echo "Detecting changed files..."
          # Determine event type and create diff accordingly
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            echo "Pull request event. Base: $BASE_REF"
            git fetch origin $BASE_REF --depth=1 || true
            CHANGED_FILES=$(git diff --name-only origin/$BASE_REF...${GITHUB_SHA})
          else
            # On push, we can compare against the 'before' commit
            CHANGED_FILES=$(git diff --name-only ${GITHUB_EVENT_BEFORE} ${GITHUB_SHA})
          fi
          echo "Changed files: $CHANGED_FILES"
          echo "$CHANGED_FILES" | grep -q "^calculator.py$" && (
            echo "calculator.py was modified in this run — failing the workflow to prevent tampering.";
            echo "To allow changes, update the CI policy or make the change on the base branch.";
            exit 1
          ) || echo "calculator.py unchanged."

      - name: Run tests
        run: |
          python -m pytest -q
